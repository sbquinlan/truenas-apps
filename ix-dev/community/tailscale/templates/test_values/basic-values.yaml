resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: America/New_York

tailscale:
  accept_dns: false
  userspace: false
  hostname: ix-tailscale
  advertise_exit_node: false
  accept_routes: false
  auth_key: tskey-12345678901234567890123456789012
  auth_once: true
  reset: false
  extra_args: []
  tailscaled_args: []
  advertise_routes: []
  additional_envs: []

services_enabled: true
tailnet_dns_suffix: example-tailnet.ts.net
services:
  - name: linkding
    endpoints:
      - protocol: https
        service_port: 443
        target_protocol: http
        target_host: 127.0.0.1
        target_port: 30000

network:
  host_network: true

ix_volumes:
  state: /opt/tests/mnt/state

storage:
  state:
    type: ix_volume
    ix_volume_config:
      dataset_name: state
      create_host_path: true
  additional_storage:
    - type: anonymous
      mount_path: /scratchpad
      volume_config:
        nocopy: true
